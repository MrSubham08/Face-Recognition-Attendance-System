{% extends 'base.html' %}
{% block title %}Admin Login — FaceAttend{% endblock %}

{% block content %}
<section class="form-section">
    <div class="glass-card glass-card-sm">
        <h2 class="form-title">
            <i class="bi bi-shield-lock" style="color: var(--accent-primary);"></i>
            Admin Login
        </h2>
        <p class="form-subtitle">Access the admin dashboard to manage attendance</p>

        <form method="POST" action="{{ url_for('admin_login') }}" id="admin-login-form">
            <div class="form-group">
                <label class="form-label-custom" for="admin-username">
                    <i class="bi bi-person"></i> Username
                </label>
                <input type="text" class="form-input" id="admin-username" name="username"
                       placeholder="Enter admin username" required>
            </div>

            <div class="form-group">
                <label class="form-label-custom" for="admin-password">
                    <i class="bi bi-key"></i> Password
                </label>
                <input type="password" class="form-input" id="admin-password" name="password"
                       placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn-primary-custom w-100 justify-content-center mt-3" id="admin-login-btn">
                <span><i class="bi bi-box-arrow-in-right"></i> Login as Admin</span>
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding: 1rem; background: var(--glass-bg); border-radius: var(--radius-md); border: 1px solid var(--glass-border);">
            <p style="color: var(--text-muted); font-size: 0.82rem; margin: 0;">
                <i class="bi bi-info-circle"></i>
                Admin access is restricted. Contact the administrator if you need access.
            </p>
        </div>
    </div>
</section>
{% endblock %}
